services:
  # ─── Base de données PostgreSQL ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: brainy-kids-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: brainy_kids
      POSTGRES_USER: ${DB_USER:-bkadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bkpass2025}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bkadmin} -d brainy_kids"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brainy-network

  # ─── Backend NestJS ─────────────────────────────────────────
  backend:
    image: ghcr.io/khmhamdi/brainykids/backend:latest
    container_name: brainy-kids-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-bkadmin}:${DB_PASSWORD:-bkpass2025}@postgres:5432/brainy_kids?schema=public
      JWT_SECRET: ${JWT_SECRET:-brainy-kids-jwt-super-secret-2025}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      PORT: 4000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - brainy-uploads:/app/uploads
    networks:
      - brainy-network

  # ─── Frontend Next.js ────────────────────────────────────────
  frontend:
    image: ghcr.io/khmhamdi/brainykids/frontend:latest
    container_name: brainy-kids-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      NODE_ENV: production
    depends_on:
      - backend
    ports:
      - "3001:3001"
    networks:
      - brainy-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: brainy-kids-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Décommenter pour SSL :
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - brainy-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    name: brainy-kids-pgdata
  brainy-uploads:
    name: brainy-kids-uploads

networks:
  brainy-network:
    name: brainy-kids-net
    driver: bridge
