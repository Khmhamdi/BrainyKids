name: 🚀 CI/CD — Brainy Kids

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/backend
  IMAGE_FRONTEND: ${{ github.repository }}/frontend

jobs:
  # ════════════════════════════════════════════════════════════
  # 1. TESTS BACKEND
  # ════════════════════════════════════════════════════════════
  test-backend:
    name: 🧪 Tests Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: brainy_kids_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BackEnd/package-lock.json

      - name: 📦 Installer les dépendances Backend
        working-directory: BackEnd
        run: npm ci

      - name: 🔧 Générer le client Prisma
        working-directory: BackEnd
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/brainy_kids_test?schema=public
        run: npx prisma generate

      - name: 🗄️ Appliquer le schéma de test
        working-directory: BackEnd
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/brainy_kids_test?schema=public
        run: npx prisma db push --accept-data-loss --skip-generate

      - name: ✅ Lancer les tests
        working-directory: BackEnd
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/brainy_kids_test?schema=public
          JWT_SECRET: test-secret-ci
        run: npm run test:ci

      - name: 📊 Uploader le rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: BackEnd/coverage/

  # ════════════════════════════════════════════════════════════
  # 2. LINT FRONTEND
  # ════════════════════════════════════════════════════════════
  lint-frontend:
    name: 🔍 Lint & Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: FrontEnd/package-lock.json

      - name: 📦 Installer les dépendances Frontend
        working-directory: FrontEnd
        run: npm ci

      - name: 🔍 Linter ESLint
        working-directory: FrontEnd
        run: npm run lint

      - name: 🏗️ Build de production
        working-directory: FrontEnd
        env:
          NEXT_PUBLIC_API_URL: http://localhost/api
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

  # ════════════════════════════════════════════════════════════
  # 3. BUILD & PUSH IMAGES DOCKER STAGING (sur develop)
  # ════════════════════════════════════════════════════════════
  build-images-staging:
    name: 🐳 Build & Push Images Docker (Staging)
    runs-on: ubuntu-latest
    needs: [test-backend, lint-frontend]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🔐 Login au registre GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚡ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔠 Mettre le nom du repo en minuscules
        id: lowercase
        run: |
          echo "image_backend=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "image_frontend=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: 🔨 Build & Push image Backend (staging)
        uses: docker/build-push-action@v5
        with:
          context: ./BackEnd
          push: true
          tags: ${{ steps.lowercase.outputs.image_backend }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔨 Build & Push image Frontend (staging)
        uses: docker/build-push-action@v5
        with:
          context: ./FrontEnd
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ steps.lowercase.outputs.image_frontend }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}

  # ════════════════════════════════════════════════════════════
  # 4. BUILD & PUSH IMAGES DOCKER PRODUCTION (sur main)
  # ════════════════════════════════════════════════════════════
  build-images:
    name: 🐳 Build & Push Images Docker (Production)
    runs-on: ubuntu-latest
    needs: [test-backend, lint-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🔐 Login au registre GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚡ Setup Docker Buildx (build multi-platform)
        uses: docker/setup-buildx-action@v3

      - name: 🏷️ Générer les tags (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: 🏷️ Générer les tags (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: 🔨 Build & Push image Backend
        uses: docker/build-push-action@v5
        with:
          context: ./BackEnd
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔨 Build & Push image Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./FrontEnd
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost/api' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ════════════════════════════════════════════════════════════
  # 5. DÉPLOIEMENT STAGING (sur branche develop)
  # ════════════════════════════════════════════════════════════
  deploy-staging:
    name: 🧪 Déploiement Staging
    runs-on: ubuntu-latest
    needs: build-images-staging
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🚀 Déployer via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: 2223
          script: |
            echo "=== 🧪 Déploiement Staging Brainy Kids ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/brainy-kids
            git pull origin develop
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "=== ✅ Staging déployé ==="

      - name: 📣 Notification succès
        if: success()
        run: echo "✅ Brainy Kids déployé avec succès sur le staging ${{ secrets.STAGING_HOST }}"

      - name: 📣 Notification échec
        if: failure()
        run: echo "❌ Échec du déploiement staging — vérifier les logs GitHub Actions"

  # ════════════════════════════════════════════════════════════
  # 6. DÉPLOIEMENT EN PRODUCTION (SSH vers le serveur)
  # ════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Déploiement Production
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🔐 Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Déployer via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "=== 🚀 Déploiement Brainy Kids ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/brainy-kids
            git pull origin main
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "=== ✅ Déploiement terminé ==="

      - name: 📣 Notification succès
        if: success()
        run: echo "✅ Brainy Kids déployé avec succès sur ${{ secrets.SERVER_HOST }}"

      - name: 📣 Notification échec
        if: failure()
        run: echo "❌ Échec du déploiement — vérifier les logs GitHub Actions"
